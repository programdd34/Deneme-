<!DOCTYPE html>
<html lang="tr">
  <head>
    <title>İstanbulkart - Başvuru Merkezleri & 153 Çözüm Noktaları</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-content">
        <div class="logo-area">
          <div class="logo-icon">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
              <rect width="36" height="36" rx="10" fill="#1565C0" />
              <circle
                cx="18"
                cy="18"
                r="9"
                stroke="white"
                stroke-width="2"
                fill="none"
              />
              <path
                d="M18 13V18L21.5 20.5"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <div class="logo-text">
            <span class="logo-main">İstanbulkart</span>
            <span class="logo-sub">Hizmet Noktaları Haritası</span>
          </div>
        </div>
        <div class="header-stats">
          <div class="stat-item">
            <span class="stat-num">11</span>
            <span class="stat-label">Başvuru Merkezi</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-num">32</span>
            <span class="stat-label">153 Çözüm Noktası</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-num">39</span>
            <span class="stat-label">İlçe</span>
          </div>
        </div>
      </div>
    </header>

    <div class="app-container">
      <aside class="sidebar">
        <div class="filter-section">
          <h3 class="filter-title">Hizmet Türü</h3>
          <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">Tümü</button>
            <button class="filter-btn" data-filter="basvuru">
              <span class="dot basvuru-dot"></span>Başvuru Merkezi
            </button>
            <button class="filter-btn" data-filter="cozum">
              <span class="dot cozum-dot"></span>153 Çözüm Noktası
            </button>
          </div>
        </div>

        <div class="filter-section">
          <h3 class="filter-title">Yakası</h3>
          <div class="filter-buttons">
            <button class="side-btn active" data-side="all">Tümü</button>
            <button class="side-btn" data-side="avrupa">
              <span class="side-dot avrupa-dot"></span>Avrupa
            </button>
            <button class="side-btn" data-side="anadolu">
              <span class="side-dot anadolu-dot"></span>Anadolu
            </button>
          </div>
        </div>

        <div class="filter-section">
          <div class="search-box">
            <svg
              class="search-icon"
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
            >
              <circle cx="7" cy="7" r="5" stroke="#9E9E9E" stroke-width="1.5" />
              <path
                d="M11 11L14 14"
                stroke="#9E9E9E"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
            <input
              type="text"
              id="searchInput"
              placeholder="İlçe veya merkez ara..."
            />
          </div>
        </div>

        <div class="results-section">
          <div class="results-header">
            <h3 class="filter-title">Sonuçlar</h3>
            <span class="results-count" id="resultsCount">43 nokta</span>
          </div>
          <div class="results-list" id="resultsList"></div>
        </div>
      </aside>

      <main class="map-wrapper">
        <div id="map"></div>
        <div class="map-legend">
          <div class="legend-title">Gösterge</div>
          <div class="legend-item">
            <div class="legend-dot basvuru-lg"></div>
            <span>Başvuru Merkezi</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot cozum-lg"></div>
            <span>153 Çözüm Noktası</span>
          </div>
        </div>
      </main>
    </div>

    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <button class="detail-close" id="detailClose">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path
              d="M14 4L4 14M4 4L14 14"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <span class="detail-badge" id="detailBadge"></span>
        <h2 class="detail-name" id="detailName"></h2>
        <div class="detail-side-tag" id="detailSideTag"></div>
      </div>
      <div class="detail-body">
        <div class="detail-row">
          <svg
            class="di"
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
          >
            <path
              d="M8 1C5.79 1 4 2.79 4 5C4 8.25 8 15 8 15C8 15 12 8.25 12 5C12 2.79 10.21 1 8 1ZM8 6.5C7.17 6.5 6.5 5.83 6.5 5C6.5 4.17 7.17 3.5 8 3.5C8.83 3.5 9.5 4.17 9.5 5C9.5 5.83 8.83 6.5 8 6.5Z"
              fill="#1565C0"
            />
          </svg>
          <div class="detail-info">
            <span class="detail-label">Adres</span>
            <span class="detail-value" id="detailAddress"></span>
          </div>
        </div>
        <div class="detail-row">
          <svg
            class="di"
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
          >
            <circle
              cx="8"
              cy="8"
              r="6"
              stroke="#1565C0"
              stroke-width="1.5"
              fill="none"
            />
            <path
              d="M8 5V8L10.5 9.5"
              stroke="#1565C0"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
          <div class="detail-info">
            <span class="detail-label">Çalışma Saatleri</span>
            <span class="detail-value" id="detailHours"></span>
          </div>
        </div>
        <div class="detail-row" id="detailPhoneRow">
          <svg
            class="di"
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
          >
            <path
              d="M3 2.5H6L7.5 6L5.5 7.5C6.37 9.27 8.73 11.63 10.5 12.5L12 10.5L15.5 12V15.5C15.5 16.33 14.83 17 14 17C7.37 17 2 11.63 2 5C2 4.17 2.67 3.5 3.5 3.5L3 2.5Z"
              fill="#1565C0"
            />
          </svg>
          <div class="detail-info">
            <span class="detail-label">Telefon</span>
            <span class="detail-value" id="detailPhone"></span>
          </div>
        </div>
        <div class="detail-row warning-row" id="detailNoteRow">
          <svg
            class="di"
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
          >
            <circle
              cx="8"
              cy="8"
              r="6"
              stroke="#E65100"
              stroke-width="1.5"
              fill="none"
            />
            <path
              d="M8 6V9M8 11V11.5"
              stroke="#E65100"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
          <div class="detail-info">
            <span class="detail-label">Not</span>
            <span class="detail-value" id="detailNote"></span>
          </div>
        </div>
        <a
          class="directions-btn"
          id="directionsBtn"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path
              d="M8 14L14 8L8 2"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M2 8H14"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
          Google Haritalar'da Aç
        </a>
      </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <script type="module" src="script.js"></script>
  </body>
</html>
